<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
<div class="row">
    <div class="col-lg-2 col-md-2  col-sm-3 panel" style="background-color:#3843D0;">

<div class="button">
	<a href="Register patient.html" class="btn btn-danger btn-md button active" ><i class="fa-solid fa-user icon" style="color: #00040a;"></i>Register Patient</a>
	<a href="../View patient/view patient.html" class="btn btn-danger btn-md button active" ><i class="fa-solid fa-eye icon" style="color: #01060e;"></i>View Patient</a>
	<a href="../Drug sells/drug sells.html" class="btn btn-danger btn-md button active" ><i class="fa-solid fa-pills icon" style="color: #020812;"></i>Drugs Sells</a>
	<a href="#" class="btn btn-link btn-md button active" >Log out?.....</a>
</div>
    </div>

    <div class="col-lg-10 col-md-10 col-sm-9">
<nav class="navbar navbar-light justify-content-between" style="background-color: #e3f2fd;">
  <a class="navbar-brand" id="brand">Patient Details (API)</a>
</nav>

<div class="container-fluid elements">
  <div class="form-row mb-3">
    <div class="col-lg-6 col-sm-12 form-inline names">
      <label for="apiBaseUrl">API URL:</label>
      <input id="apiBaseUrl" type="text" class="form-control" value="http://localhost:5000/api">
    </div>
    <div class="col-lg-6 col-sm-12 form-inline names">
      <label for="apiToken">JWT Token:</label>
      <input id="apiToken" type="text" class="form-control" placeholder="Paste token from login page">
    </div>
  </div>

<form id="patientForm">
  <div class="form-row">
    <div class="col-lg-6 col-sm-12 form-inline names">
    	<label for="firstName">First Name:</label>
      <input id="firstName" type="text" class="form-control" placeholder="first name" required>
    </div>
    <div class="col-lg-6 col-sm-12 form-inline names">
    	<label for="lastName">Last Name:</label>
      <input id="lastName" type="text" class="form-control" placeholder="last name" required>
    </div>
  </div>

<div class="form-row">
  <div class="col form-inline">
    <fieldset class="form-group">
      <div class="row">
        <legend class="col-form-label col-sm-2 pt-0">Gender:</legend>
        <div class="col-sm-10">
          <div class="form-check">
            <input id="genderMale" class="form-check-input" type="radio" name="gender" value="Male" checked>
            <label class="form-check-label" for="genderMale">Male</label>
          </div>
          <div class="form-check">
            <input id="genderFemale" class="form-check-input" type="radio" name="gender" value="Female">
            <label class="form-check-label" for="genderFemale">Female</label>
          </div>
        </div>
      </div>
    </fieldset>
  </div>

  <div class="col-lg-6 col-sm-12 form-inline">
  	<label for="age">Patient Age:</label>
  	<input id="age" type="number" min="0" class="form-control" placeholder="In Years" required>
  </div>
</div>

 <div class="form-group form-inline">
    <label for="address">Address:</label>
    <input id="address" type="text" class="form-control"  placeholder="@place name">
  </div>

<div class="row">
  <div class="col-lg-6 form-inline typeID">
	<label for="phone">Phone:</label>
	<input id="phone" class="form-control" type="text" placeholder="Phone number">
  </div>
  <div class="col-lg-6 form-inline typeID">
	<label for="doctorName">Doctor:</label>
	<input id="doctorName" class="form-control" type="text" placeholder="Attending doctor">
  </div>
</div>

<div class="row">
  <div class="col-lg-8 col-sm-10 form-group">
    <label for="diagnosis">Diagnosis For:</label>
    <textarea id="diagnosis" class="form-control textarea" rows="3"></textarea>
  </div>
</div>

<div class="record-btn">
  <button id="recordBtn" type="submit" class="btn btn-success">Record (POST /patients)</button>
  <p id="statusMessage" class="mt-2"></p>
</div>
</form>

</div>
</div>
</div>
